name: Demo

# Re-records demo/demo.gif with Charm VHS against the fake API in e2e/
# (deterministic, keyless) and commits the result back to main.
#
# No loop by construction: the bot commit only touches demo.gif, which is
# outside the paths filter below, and its "chore:" message never cuts a
# release in the release workflow.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - demo/demo.tape
      - demo/reply.md
      - demo/record.sh

permissions:
  contents: write

concurrency:
  group: demo

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install VHS and its dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-jetbrains-mono
          curl -fsSL -o /tmp/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          sudo install /tmp/ttyd /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: ./demo/record.sh
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update demo GIF"
          file_pattern: demo/demo.gif
