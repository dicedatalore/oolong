name: Release

# Two paths into a release:
#   - push to main: the tag job derives the next semver from conventional
#     commits since the last tag (feat → minor, fix → patch, breaking →
#     major) and pushes it; chore/docs/test-only pushes produce no tag and
#     no release. The tag is created with GITHUB_TOKEN, which deliberately
#     does not retrigger this workflow, so goreleaser runs as a second job
#     in the same run.
#   - manual tag push (escape hatch for forcing a version): the tag job is
#     skipped and goreleaser releases the pushed tag as before.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

# Serialize runs so two quick pushes can't race the tag computation.
concurrency:
  group: release

jobs:
  tag:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      # golang.design/x/clipboard needs the X11 headers on Linux.
      - name: Install X11 headers
        run: sudo apt-get update && sudo apt-get install -y libx11-dev
      # Release gate: a red main must not get tagged and shipped.
      - run: go build ./...
      - run: go test ./...
      # Inlined replacement for mathieudutour/github-tag-action, which is
      # unmaintained and stuck on the deprecated node20 runtime: breaking
      # (! marker or BREAKING CHANGE footer) → major, feat → minor, fix →
      # patch. No feat/fix/breaking commits since the last tag → no new tag
      # (new_tag stays empty and the goreleaser job is skipped). The push
      # uses the checkout's GITHUB_TOKEN credentials, so it deliberately
      # does not retrigger this workflow, same as the action did.
      - id: bump
        run: |
          if last=$(git describe --tags --abbrev=0 2>/dev/null); then
            range="$last..HEAD"
          else
            last=v0.0.0
            range=HEAD
          fi
          subjects=$(git log --format=%s "$range")
          bodies=$(git log --format=%b "$range")
          if grep -qE '^[a-z]+(\([^)]+\))?!: ' <<<"$subjects" || grep -q '^BREAKING CHANGE' <<<"$bodies"; then
            bump=major
          elif grep -qE '^feat(\([^)]+\))?: ' <<<"$subjects"; then
            bump=minor
          elif grep -qE '^fix(\([^)]+\))?: ' <<<"$subjects"; then
            bump=patch
          else
            echo "no feat/fix/breaking commits since $last; not tagging"
            exit 0
          fi
          IFS=. read -r major minor patch <<<"${last#v}"
          case $bump in
            major) new_tag="v$((major + 1)).0.0" ;;
            minor) new_tag="v$major.$((minor + 1)).0" ;;
            patch) new_tag="v$major.$minor.$((patch + 1))" ;;
          esac
          git tag "$new_tag"
          git push origin "$new_tag"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "tagged $new_tag ($bump bump from $last)"

  goreleaser:
    needs: [tag]
    # Run for a manual tag push (tag job skipped) or when the tag job cut a
    # new version; !cancelled() lets the tag-push path past the skipped need.
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.tag.outputs.new_tag != '') }}
    # macOS arm64 runner: the darwin/arm64 build needs cgo for clipboard
    # image paste; everything else cross-compiles with CGO_ENABLED=0.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag || github.ref }}
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  # Re-record the demo GIF after the release so its banner shows the
  # version that just shipped, not the previous one.
  demo:
    needs: [goreleaser]
    if: ${{ !cancelled() && needs.goreleaser.result == 'success' }}
    uses: ./.github/workflows/demo.yml
    permissions:
      contents: write
